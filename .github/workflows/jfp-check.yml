name: JFP Check

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**/*.jfp"
      - "tools/**"
      - "examples/**"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  jfp-check:
    name: Validate JFP specifications
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Inspect PR control specification
        run: python tools/jfp_cli.py inspect examples/pr-control/pr-control.jfp

      - name: Validate PR control specification
        run: python tools/jfp_cli.py validate examples/pr-control/pr-control.jfp

      - name: Parse PR control specification
        run: python tools/jfp_cli.py parse examples/pr-control/pr-control.jfp

      - name: Prepare JFP PR comment
        if: github.event_name == 'pull_request'
        run: |
          cat > jfp-pr-comment.md <<'EOF'
          ## JFP PR Control: APPROVE

          The JFP workflow completed successfully.

          Checks completed:
          - PR control specification inspected
          - PR control specification validated
          - PR control specification parsed

          Current mode: advisory CI comment.

          This workflow does not block merge yet. Future versions may fail the check when SIGNAL_ORANGE is detected.
          EOF

      - name: Comment on pull request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('jfp-pr-comment.md', 'utf8');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
